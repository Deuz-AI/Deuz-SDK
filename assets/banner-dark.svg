<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Deuz SDK — the zero-dependency AI SDK for TypeScript">
  <defs>
    <linearGradient id="brand" x1="380" y1="120" x2="820" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eb1ff"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
