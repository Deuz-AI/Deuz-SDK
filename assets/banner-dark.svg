  <text x="122" y="204" font-family="ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="27" font-weight="500" letter-spacing="0.2" fill="#8b93a3">The zero-dependency AI SDK for TypeScript</text>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="16" font-weight="500">
