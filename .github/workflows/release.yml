name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish npm packages
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # npm trusted publishing requires Node >=22.14.
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Require tag to match package version
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./packages/core/package.json').version")"
      - run: npm ci
      - run: npm ci --prefix docs
      - run: npm run release:verify
      - name: Install the trusted-publishing npm version
        run: npm install --global npm@11.18.0
      - name: Verify npm version
        run: test "$(npm --version)" = "11.18.0"
        shell: bash
      - name: Publish with provenance
        shell: bash
        # Publishes every workspace package whose version is not on npm yet
        # (@deuz-sdk/core + @deuz-sdk/react, fixed version group).
        # Authentication preference:
        #  1. npm trusted publishing (OIDC) for both packages, configured for
        #     Deuz-AI/Deuz-SDK, release.yml, and the `npm` environment.
        #  2. NPM_TOKEN in the `npm` environment as a fallback.
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            npm config delete //registry.npmjs.org/:_authToken || true
          fi
          npx changeset publish --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Create GitHub release (skip when it already exists)
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
