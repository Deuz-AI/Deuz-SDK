name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish npm package
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Require tag to match package version
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - run: npm ci
      - run: npm ci --prefix docs
      - run: npm run release:verify
      # Trusted publishing (OIDC) needs npm >= 11.5. Pinned to the npm 11 line:
      # npm 12 changed `npm pack --json` output, which breaks tooling/verify-package.mjs
      # when prepublishOnly re-runs the check gate during publish.
      - name: Update npm (trusted publishing requires >= 11.5)
        run: npm install -g npm@11
      - name: Publish with provenance
        shell: bash
        # Two auth paths, in preference order:
        #  1. npm trusted publishing (OIDC) — configure the Trusted Publisher on
        #     npmjs.com for this repo + workflow; no secret needed (id-token: write
        #     above). The empty authToken line setup-node wrote must be removed or
        #     npm sends an empty token instead of minting OIDC credentials.
        #  2. NPM_TOKEN secret in the `npm` environment — classic token auth.
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm publish --access public --provenance
          else
            npm config delete //registry.npmjs.org/:_authToken || true
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release (skip when it already exists)
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
